server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Auto-detect language and redirect / to the best locale ──
    set $default_lang "en";

    location = / {
        # Accept-Language based redirect
        set $lang $default_lang;

        if ($http_accept_language ~* "^es") { set $lang "es"; }
        if ($http_accept_language ~* "^pl") { set $lang "pl"; }
        if ($http_accept_language ~* "^ja") { set $lang "ja"; }

        return 302 $scheme://$http_host/$lang/;
    }

    # ── Locale-specific SPA routes ──
    location /es/ {
        alias /usr/share/nginx/html/es/;
        try_files $uri $uri/ /es/index.html;
    }

    location /en/ {
        alias /usr/share/nginx/html/en/;
        try_files $uri $uri/ /en/index.html;
    }

    location /pl/ {
        alias /usr/share/nginx/html/pl/;
        try_files $uri $uri/ /pl/index.html;
    }

    location /ja/ {
        alias /usr/share/nginx/html/ja/;
        try_files $uri $uri/ /ja/index.html;
    }

    # ── Reverse proxy: API REST (business-server) ──
    location /api/ {
        proxy_pass http://business-server:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Reverse proxy: Auth server REST API ──
    location /auth-server/ {
        proxy_pass http://auth-server:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Cache for static assets ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
