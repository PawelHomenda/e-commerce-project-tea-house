<div class="login-container">
  <h2 i18n="login.title@@login.title">Iniciar Sesión</h2>

  <form [formGroup]="loginForm" (ngSubmit)="submit()">
    <div class="form-group">
      <label for="username" i18n="login.username@@login.username">Usuario</label>
      <input id="username" type="text" formControlName="username" class="form-control" />
    </div>

    <div class="form-group">
      <label for="password" i18n="login.password@@login.password">Contraseña</label>
      <input id="password" type="password" formControlName="password" class="form-control" />
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
      <ng-container *ngIf="isSubmitting" i18n="login.submitting@@login.submitting">Entrando...</ng-container>
      <ng-container *ngIf="!isSubmitting" i18n="login.submit@@login.submit">Entrar</ng-container>
    </button>
  </form>
</div>
