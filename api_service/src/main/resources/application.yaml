spring:
  profiles:
    active:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "http://localhost:9000"
    
  datasource:
    url: jdbc:mysql://localhost:3306/casa_te
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect 
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        
logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN