services:

  # ─────────────────────────────────────────────
  # Base de datos MySQL
  # ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: teahouse-db
    restart: always
    environment:
      MYSQL_DATABASE: casa_te
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    networks:
      - teahouse-network
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Servidor de Autenticación OAuth2 (puerto 9000)
  # auth_server NO usa base de datos
  # ─────────────────────────────────────────────
  auth-server:
    build:
      context: ./auth_server
    container_name: teahouse-auth
    ports:
      - "9000:9000"
      - "5006:5005"       # ← Puerto debug JDWP (auth-server)
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    networks:
      - teahouse-network

  # ─────────────────────────────────────────────
  # API REST (puerto 8080)
  # ─────────────────────────────────────────────
  business-server:
    build:
      context: ./api_service
    container_name: teahouse-business
    ports:
      - "8080:8080"
      - "5005:5005"       # ← Puerto debug JDWP (business-server)
    environment:
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      # MySQL: apunta al servicio 'db' dentro de la red Docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/casa_te?zeroDateTimeBehavior=CONVERT_TO_NULL&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${DB_ROOT_PASSWORD}
      # JWT: usa jwk-set-uri en vez de issuer-uri para evitar el mismatch de issuer
      # (los tokens tienen iss=http://localhost:9000 pero la red interna usa auth-server:9000)
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://auth-server:9000/oauth2/jwks
    depends_on:
      db:
        condition: service_healthy
      auth-server:
        condition: service_started
    networks:
      - teahouse-network

  # ─────────────────────────────────────────────
  # Frontend Angular (puerto 4200 → nginx:80)
  # ─────────────────────────────────────────────
  browser-interface:
    build:
      context: ./browser-interface
    container_name: teahouse-frontend
    ports:
      - "4200:80"
    depends_on:
      - business-server
    networks:
      - teahouse-network

networks:
  teahouse-network:
    driver: bridge

volumes:
  db_data: